services:
  opa:
    image: openpolicyagent/opa:latest-static
    container_name: ai-gateway-opa
    ports:
      - '8181:8181'
    volumes:
      - ./opa:/policies
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8181/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-postgres
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway_dev
      POSTGRES_DB: ai_gateway
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gateway -d ai_gateway']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
