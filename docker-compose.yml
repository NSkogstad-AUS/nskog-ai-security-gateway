version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-postgres
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway_dev
      POSTGRES_DB: ai_gateway
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gateway -d ai_gateway']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
